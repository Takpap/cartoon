name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          echo '[install]' > bunfig.toml
          echo 'registry = "https://registry.npmmirror.com"' >> bunfig.toml
          bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || 22 }}
          SOURCE: ".output/"
          TARGET: ${{ secrets.DEPLOY_PATH }}
          EXCLUDE: "node_modules/, .git/, .env"
          SCRIPT_AFTER: |
            cd ${{ secrets.DEPLOY_PATH }}
            pm2 restart manju || pm2 start .output/server/index.mjs --name manju
