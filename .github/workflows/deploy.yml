name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          echo '[install]' > bunfig.toml
          echo 'registry = "https://registry.npmmirror.com"' >> bunfig.toml
          bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.REMOTE_PORT || 22 }} ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          tar -czf deploy.tar.gz -C .output .
          scp -P ${{ secrets.REMOTE_PORT || 22 }} -i ~/.ssh/deploy_key deploy.tar.gz package.json bun.lock ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/tmp/
          ssh -p ${{ secrets.REMOTE_PORT || 22 }} -i ~/.ssh/deploy_key ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "
            cd ${{ secrets.DEPLOY_PATH }} && \
            mv data /tmp/manju_data_backup 2>/dev/null || true && \
            mv public /tmp/manju_public_backup 2>/dev/null || true && \
            mv ecosystem.config.cjs /tmp/manju_ecosystem_backup 2>/dev/null || true && \
            rm -rf * && \
            tar -xzf /tmp/deploy.tar.gz && \
            cp /tmp/package.json /tmp/bun.lock . && \
            mv /tmp/manju_ecosystem_backup ecosystem.config.cjs 2>/dev/null || true && \
            mv /tmp/manju_data_backup data 2>/dev/null || mkdir -p data && \
            mv /tmp/manju_public_backup public 2>/dev/null || mkdir -p public && \
            rm -f /tmp/deploy.tar.gz /tmp/package.json /tmp/bun.lock
          "

      - name: Install server dependencies (if lockfile changed)
        run: |
          ssh -p ${{ secrets.REMOTE_PORT || 22 }} -i ~/.ssh/deploy_key ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} '
            cd ${{ secrets.DEPLOY_PATH }}
            
            # 检查 bun.lock 是否变化
            if [ -f .bun.lock.md5 ] && md5sum -c .bun.lock.md5 --status 2>/dev/null; then
              echo "依赖未变化，跳过安装"
            else
              echo "依赖有变化，重新安装 better-sqlite3"
              source ~/.bashrc
              cd server && rm -rf node_modules/better-sqlite3 && npm install better-sqlite3
              cd ..
              md5sum bun.lock > .bun.lock.md5
            fi
          '

      - name: Restart PM2
        run: |
          ssh -p ${{ secrets.REMOTE_PORT || 22 }} -i ~/.ssh/deploy_key ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "source ~/.bashrc; cd ${{ secrets.DEPLOY_PATH }} && pm2 delete manju 2>/dev/null; pm2 start ecosystem.config.cjs"
